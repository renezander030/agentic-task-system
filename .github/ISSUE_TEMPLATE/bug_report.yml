name: Bug report
description: Something in ATS isn't working as expected
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: ATS version
      placeholder: "ats --version (e.g. @reneza/ats-cli 0.2.0)"
    validations:
      required: true
  - type: dropdown
    id: adapter
    attributes:
      label: Adapter
      options:
        - ticktick
        - custom / other
        - n/a
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: The command you ran, what you expected, and what you got. Paste any error output.
      render: shell
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, Node version, and (for semantic retrieval) qdrant / ollama versions.
